version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: sansaweigh-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sansaweigh
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7.2-alpine
    container_name: sansaweigh-redis
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning

volumes:
  mongo-data:
