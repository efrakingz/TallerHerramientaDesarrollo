spring:
  data:
    mongodb:
      # Flapdoodle embedded MongoDB is auto-configured for tests
      uri: mongodb://localhost:27017/sansaweigh-test
    redis:
      host: localhost
      port: 6379

sansaweigh:
  sansa-to-kg: 1.337
  redis:
    scale-cache-ttl: 120
  external:
    scale-api-url: http://localhost:9090/api/scales

logging:
  level:
    com.sansaweigh: DEBUG
